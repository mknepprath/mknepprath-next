name: Update Themes

on:
  schedule:
    # Run daily at 6 AM UTC (1 AM ET)
    - cron: "0 6 * * *"
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: write
  pull-requests: write

jobs:
  update-themes:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.ACTION_GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Run theme detection
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: npx ts-node -O '{"module":"commonjs","types":["node"]}' scripts/update-themes.ts

      - name: Check for changes
        id: changes
        run: |
          if git diff --quiet data/themes.json; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Open PR
        if: steps.changes.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.ACTION_GITHUB_TOKEN }}
        run: |
          BRANCH="automated/update-themes-$(date +%Y%m%d)"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add data/themes.json
          git commit --no-verify -m "Update themes (automated)"
          git push origin "$BRANCH"
          gh pr create \
            --title "Update themes (automated)" \
            --body "Automated theme detection found new or updated themes." \
            --head "$BRANCH" \
            --base master

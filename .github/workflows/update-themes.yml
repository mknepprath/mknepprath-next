name: Update Themes

on:
  schedule:
    # Run daily at 6 AM UTC (1 AM ET)
    - cron: "0 6 * * *"
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: update-themes
  cancel-in-progress: false

jobs:
  update-themes:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.ACTION_GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Run theme detection
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: npx ts-node -O '{"module":"commonjs","types":["node"]}' scripts/update-themes.ts

      - name: Check for changes
        id: changes
        run: |
          if git diff --quiet data/themes.json; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Close stale update-themes PRs
        if: steps.changes.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.ACTION_GITHUB_TOKEN }}
        run: |
          gh pr list --state open --json number,title \
            --jq '.[] | select(.title == "Update themes (automated)") | .number' | \
            xargs -r -I {} gh pr close {} --comment "Superseded by direct push to master."

      - name: Commit and push to master
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/themes.json
          git commit --no-verify -m "Update themes (automated)"
          git pull --rebase origin master
          git push origin master
